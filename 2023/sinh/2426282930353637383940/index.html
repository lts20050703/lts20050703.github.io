id:33,right:3},{question:" Theo thuyết tiến hóa hiện đại, có bao nhiêu phát biểu sau đây đúng về chọn lọc tự nhiên?\r\u003Cbr> (1) Chọn lọc tự nhiên tác động trực tiếp lên kiểu hình và giáp tiếp làm biến đổi tần số kiểu gen của quần thể.\r\u003Cbr> (2) Chọn lọc tự nhiên chống lại alen trội làm biến đổi tần số alen của quần thể nhanh hơn so với chọn lọc chống lại alen lặn.\r\u003Cbr> (3) Chọn lọc tự nhiên làm xuất hiện các alen mới và làm thay đổi tuần số alen của quần thể.\r\u003Cbr> (4) Chọn lọc tự nhiên có thể làm biến đổi tần số alen một cách đột ngột không theo một hướng xác định.\r\u003Cbr>",answers:[{answer:" 3.\r\u003Cbr>",id:0},{answer:" 4.\r\u003Cbr>",id:1},{answer:" 1.\r\u003Cbr>",id:2},{answer:" 2.\r\u003Cbr>",id:3}],id:34,right:3},{question:" \"... là một hoặc một nhóm quần thể gồm các cá thể có khả năng giao phối với nhau trong tự nhiên sinh ra đời con có sức sống và có khả năng sinh sản, cách li sinh sản với các nhóm quần thể khác\". Từ cần điền vào chỗ trống là?\r\u003Cbr>",answers:[{answer:" Loài.\r\u003Cbr>",id:0},{answer:" Chi.\r\u003Cbr>",id:1},{answer:" Quần thể giao phối.\r\u003Cbr>",id:2},{answer:" Họ.\r\u003Cbr>",id:3}],id:35,right:0},{question:" Dạng cách li nào sau đây không phải là cách li trước hợp tử?\r\u003Cbr>",answers:[{answer:" Cách li địa lí.\r\u003Cbr>",id:0},{answer:" Cách li cơ học.\r\u003Cbr>",id:1},{answer:" Cách li tập tính.\r\u003Cbr>",id:2},{answer:" Cách li thời gian.\r\u003Cbr>",id:3}],id:36,right:0},{question:" Hiện tượng các cá thể không giao phối với nhau do chênh lệch mùa sinh sản như thời kì ra hoa, đẻ trứng thuộc dạng cách li nào sau đây?\r\u003Cbr>",answers:[{answer:" Cách li cơ học.\r\u003Cbr>",id:0},{answer:" Cách li nơi ở.\r\u003Cbr>",id:1},{answer:" Cách li tập tính.\r\u003Cbr>",id:2},{answer:" Cách li thời gian.\r\u003Cbr>",id:3}],id:37,right:3},{question:" Các cá thể không giao phối được do không tương hợp về cơ quan giao phối thuộc dạng cách li nào sau đây?\r\u003Cbr>",answers:[{answer:" Cách li cơ học.\r\u003Cbr>",id:0},{answer:" Cách li nơi ở.\r\u003Cbr>",id:1},{answer:" Cách li tập tính.\r\u003Cbr>",id:2},{answer:" Cách li thời gian.\r\u003Cbr>",id:3}],id:38,right:0},{question:" Tiêu chuẩn nào sau đây được sử dụng thông dụng để phân biệt hai loài?\r\u003Cbr>",answers:[{answer:" Tiêu chuẩn hình thái.\r\u003Cbr>",id:0},{answer:" Tiêu chuẩn hóa sinh.\r\u003Cbr>",id:1},{answer:" Tiêu chuẩn cách li sinh sản.\r\u003Cbr>",id:2},{answer:" Tiêu chuẩn phân tử.\r\u003Cbr>",id:3}],id:39,right:2},{question:" Cách li sau hợp tử là?\r\u003Cbr>",answers:[{answer:" Trở ngại ngăn cản con lai phát triển.\r\u003Cbr>",id:0},{answer:" Trở ngại ngăn cản sự thụ tinh.\r\u003Cbr>",id:1},{answer:" Trở ngại ngăn cản tạo thành giao tử.\r\u003Cbr>",id:2},{answer:" Trở ngại ngăn cản con lai hữu thụ.\r\u003Cbr>",id:3}],id:40,right:0},{question:" Hạt phấn của hoa mướp rơi lên đầu ngụy của hoa bí, sau đó hạt phấn nảy mầm thành ống phấn nhưng độ dài ống phấn ngắn hơn vòi nhụy của hoa bí nên giao tử đực của mướp không tới được noãn của hoa bí để thụ tinh. Đây là loại cách li nào?\r\u003Cbr>",answers:[{answer:" Cách li không gian.\r\u003Cbr>",id:0},{answer:" Cách li cơ học.\r\u003Cbr>",id:1},{answer:" Cách li tập tính.\r\u003Cbr>",id:2},{answer:" Cách li sinh thái.\r\u003Cbr>",id:3}],id:41,right:1},{question:" Vai trò chủ yếu của cơ chế cách li trong tiến hóa là?\r\u003Cbr>",answers:[{answer:" Phân hóa khả năng sinh sản của các kiểu gen.\r\u003Cbr>",id:0},{answer:" Nguồn nguyên liệu sơ cấp cho chọn lọc.\r\u003Cbr>",id:1},{answer:" Tạo nguyên liệu thứ cấp cho tiến hóa nhỏ.\r\u003Cbr>",id:2},{answer:" Củng cố và tăng cường phân hóa kiểu gen.\r\u003Cbr>",id:3}],id:42,right:3},{question:" Có bao nhiêu hiện tượng sau đây biểu hiện cách li trước hợp tử?\r\u003Cbr> I. Cách li nơi ở.\r\u003Cbr> II. Cách li cơ học.\r\u003Cbr> III. Cách li tập tính.\r\u003Cbr> IV. Cách li địa lí.\r\u003Cbr> V. Cách li thời gian.\r\u003Cbr> VI. Cách li khoảng cách.\r\u003Cbr>",answers:[{answer:" 2.\r\u003Cbr>",id:0},{answer:" 3.\r\u003Cbr>",id:1},{answer:" 4.\r\u003Cbr>",id:2},{answer:" 5.\r\u003Cbr>",id:3}],id:43,right:2},{question:" Những ví dụ nào sau đây biểu hiện của cách li sau hợp tử?\r\u003Cbr> (I). Các cá thể của quần thể này có giao phối với cá thể của quần thể kia nhưng không tạo được hợp tử.\r\u003Cbr> (II). Hai quần thể sinh sản vào hai mùa khác nhau.\r\u003Cbr> (III). Các cá thể của quần thể này có giao phối với cá thể của quần thể kia nhưng phôi bị chết trước khi sinh.\r\u003Cbr> (IV). Các cá thể giao phối với nhau và sinh con nhưng con không sinh sản hữu tính.\r\u003Cbr> (V). Các cá thể có tập tính giao phối khác nhau nên mặc dù ở trong một môi trường nhưng bị cách li sinh sản.\r\u003Cbr>",answers:[{answer:" (I) và (II).\r\u003Cbr>",id:0},{answer:" (III) và (IV).\r\u003Cbr>",id:1},{answer:" (III) và (V).\r\u003Cbr>",id:2},{answer:" (II) và (IV).\r\u003Cbr>",id:3}],id:44,right:1},{question:" Con đường hình thành loài mới nào diễn ra chủ yếu ở loài có khả năng phát tán xa và thời gian hình thành loài mới tương đối chậm?\r\u003Cbr>",answers:[{answer:" Hình thành loài khác khu vực địa lý.\r\u003Cbr>",id:0},{answer:" Hình thành loài bằng cách li sinh thái.\r\u003Cbr>",id:1},{answer:" Hình thành loài bằng cách li tập tính.\r\u003Cbr>",id:2},{answer:" Hình thành loài bằng lai xa và đa bội hóa.\r\u003Cbr>",id:3}],id:45,right:0},{question:" Ví dụ nào sau đây không phải là cách li địa lý?\r\u003Cbr>",answers:[{answer:" Những con chuột sống trên những hòn đảo khác nhau bị cách li bởi đại dương.\r\u003Cbr>",id:0},{answer:" Hai loài cây sống ở hai bên sườn của ngọn núi cao.\r\u003Cbr>",id:1},{answer:" Những con cá ở hai khúc sống bị chia cách bởi giải đất liền.\r\u003Cbr>",id:2},{answer:" Những loài cách có thời gian nở hoa khác nhau.\r\u003Cbr>",id:3}],id:46,right:3},{question:" Các quần thể khác nhau, bị một trở ngại địa lý làm cho chúng cách li nhau, sự giao phối ở cá thể giữa hai quần thể gặp trở ngại, sau một thời gian dài có thể hình thành nên hai loài mới, khi giữa hai quần thể này xuất hiện?\r\u003Cbr>",answers:[{answer:" Cách li sinh sản.\r\u003Cbr>",id:0},{answer:" Sự sai khác di truyền.\r\u003Cbr>",id:1},{answer:" Những đặc điểm thích nghi.\r\u003Cbr>",id:2},{answer:" Sự sai khác tần số kiểu gen.\r\u003Cbr>",id:3}],id:47,right:0},{question:" Nhóm loài nào sau đây dễ hình thành loài mới bằng con đường cách li địa lý?\r\u003Cbr>",answers:[{answer:" Chim.\r\u003Cbr>",id:0},{answer:" Thực vật thân thấp.\r\u003Cbr>",id:1},{answer:" Ốc sên.\r\u003Cbr>",id:2},{answer:" Kiến vàng.\r\u003Cbr>",id:3}],id:48,right:0},{question:" Khi nói về vai trò của cách li địa lí trong quá trình hình thành loài mới, có bao nhiêu phát biểu sau đây là không đúng?\r\u003Cbr> I. Cách li địa lí là những trở ngại về mặt địa lí như sông, núi, biển... ngăn cản các cá thể của quần thể khác loài gặp gỡ và giao phối với nhau.\r\u003Cbr> II. Cách li địa lí trong một thời gian dài tất yếu sẽ dẫn tới cách li sinh sản và hình thành loài mới.\r\u003Cbr> III. Cách li địa lí góp phần duy trì sự khác biệt về vốn gen giữa các quần thể được tạo ra bởi các nhân tố tiến hóa.\r\u003Cbr> IV. Cách li địa lí có thể xảy ra với những loài có khả năng phát tán mạnh, có khả năng di cư và ít di cư.\r\u003Cbr>",answers:[{answer:" 2.\r\u003Cbr>",id:0},{answer:" 1.\r\u003Cbr>",id:1},{answer:" 3.\r\u003Cbr>",id:2},{answer:" 4.\r\u003Cbr>",id:3}],id:49,right:2},{question:" Khi nói về quá trình hình thành loài mới, kết luận nào sau đây sai?\r\u003Cbr>",answers:[{answer:" Sự hình thành loài mới bằng lai xa và đa bội hóa không liên quan đến chọn lọc tự nhiên.\r\u003Cbr>",id:0},{answer:" Cách li địa lí là nhân tố thúc đẩy sự phân hóa vốn gen của quần thể.\r\u003Cbr>",id:1},{answer:" Ở những loài sinh sản hữu tính, cách li sinh sản đánh dấu sự hình thành loài mới.\r\u003Cbr>",id:2},{answer:" Trong quá trình hình thành loài mới bằng con đường sinh thái không cần đến sự cách li địa lý.\r\u003Cbr>",id:3}],id:50,right:0},{question:" Phát biểu nào sau đây đúng khi nói về quá trình hình thành loài mới?\r\u003Cbr>",answers:[{answer:" Phần lớn các loài thực vật có hoa và dương xỉ được hình thành bằng con đường cách li sinh thái.\r\u003Cbr>",id:0},{answer:" Hình thành loài bằng con đường cách li sinh thái và con đường lai xa và đa bội hóa xảy ra trong cùng khu phân bố.\r\u003Cbr>",id:1},{answer:" Ở thực vật, một cá thể được xem là loài mới khi được hình thành bằng cách lai giữa hai loài khác nhau và được đa bội hóa.\r\u003Cbr>",id:2},{answer:" Hình thành loài mới ở thực vật có thể diễn ra bằng các con đường cách li địa lí, cách li tập tính, cách li sinh thái.\r\u003Cbr>",id:3}],id:51,right:1},{question:" So với những con đường hình thành loài mới khác, quá trình hình thành loài khác khu vực địa lý thường diễn ra?\r\u003Cbr>",answers:[{answer:" Nhanh hơn do loài dễ phát tán xa hơn.\r\u003Cbr>",id:0},{answer:" Chậm hơn do cần nhiều dạng trung gian chuyển tiếp hơn.\r\u003Cbr>",id:1},{answer:" Tương đương nhau do cần thời gian để tích lũy đủ những sai khác di truyền.\r\u003Cbr>",id:2},{answer:" Không thể so sánh vì cách thức hình thành loài mới ở các kiểu là khác nhau.\r\u003Cbr>",id:3}],id:52,right:1},{question:" Sự hình thành loài mới có thể xảy ra mà không cần cách li địa lý nhưng phải xuất hiện điều kiện nào sau đây?\r\u003Cbr>",answers:[{answer:" Thay đổi tần số alen trong quần thể.\r\u003Cbr>",id:0},{answer:" Thay đổi tần số kiểu gen trong quần thể.\r\u003Cbr>",id:1},{answer:" Cách li sinh sản trong quần thể.\r\u003Cbr>",id:2},{answer:" Thay đổi điều kiện sống trong quần thể.\r\u003Cbr>",id:3}],id:53,right:2},{question:" Quá trình hình thành loài bằng cách li sinh thái thường xảy ra ở những loài?\r\u003Cbr>",answers:[{answer:" Bọ xít ít di chuyển.\r\u003Cbr>",id:0},{answer:" Chim.\r\u003Cbr>",id:1},{answer:" Cá di cư.\r\u003Cbr>",id:2},{answer:" Côn trùng bay xa.\r\u003Cbr>",id:3}],id:54,right:0},{question:" Nguyên nhân chính dẫn đến sự sai khác thành phần kiểu gen và tần số alen giữa hai quần thể sống trong cùng khu vực địa lý nhưng ở hai sinh cảnh khác nhau là?\r\u003Cbr>",answers:[{answer:" Những cá thể thích giao phối trong cùng ổ sinh thái.\r\u003Cbr>",id:0},{answer:" Những cá thể giữa hai ổ sinh thái thường xuyên giao phối với nhau.\r\u003Cbr>",id:1},{answer:" Luôn có sự di nhập gen giữa cá thể ở hai quần thể.\r\u003Cbr>",id:2},{answer:" Chọn lọc tự nhiên tác động khác nhau hai quần thể.\r\u003Cbr>",id:3}],id:55,right:0},{question:" Hình thành loài bằng lai xa và đa bội hóa thường gặp ở những nhóm loài nào sau đây?\r\u003Cbr>",answers:[{answer:" Động vật phát tán xa.\r\u003Cbr>",id:0},{answer:" Động vật di chuyển chậm.\r\u003Cbr>",id:1},{answer:" Thực vật có hoa và dương xỉ.\r\u003Cbr>",id:2},{answer:" Động vật hoặc thực vật.\r\u003Cbr>",id:3}],id:56,right:2},{question:" Bộ nhiễm sắc thể của cây lai giữa hai loài cải bắp và cải củ là?\r\u003Cbr>",answers:[{answer:" 18 NST với các dạng NST khác nhau.\r\u003Cbr>",id:0},{answer:" 9 NST với 9 dạng khác nhau.\r\u003Cbr>",id:1},{answer:" 36 NST với 36 dạng NST khác nhau.\r\u003Cbr>",id:2},{answer:" 36 NST với 18 dạng NST khác nhau.\r\u003Cbr>",id:3}],id:57,right:0},{question:" Cơ chế hình thành của loài lúa mì trồng ngày nay là con cháu của 3 loài khác nhau lai với nhau và đa bội hóa. Cơ chế chính được mô tả như sau?\r\u003Cbr>",answers:[{answer:" AA x BB => AB => AABB x DD => ABD đa bội hóa AABBDD\r\u003Cbr>",id:0},{answer:" AAAA x BBBB => AABB x DD => ABD => đa bội hóa => AABBDD\r\u003Cbr>",id:1},{answer:" AA x BB => AB đa bội hóa AAAABBBB x DDDD => AABBDD\r\u003Cbr>",id:2},{answer:" AAAA x BBBB => AABB x DDDD => ABDD => đa bội hóa => AABBDD\r\u003Cbr>",id:3}],id:58,right:0},{question:" Khi nói về sự hình thành loài mới bằng con đường địa lý, phát biểu nào sau đây đúng?\r\u003Cbr>",answers:[{answer:" Là phương thức hình thành loài chủ yếu gặp ở động vật, ít gặp ở thực vật.\r\u003Cbr>",id:0},{answer:" Điều kiện địa lý là nguyên nhân trực tiếp gây ra những biến đổi trên cơ thể sinh vật.\r\u003Cbr>",id:1},{answer:" Cách li địa lý là nhân tố tạo điều kiện cho sự phân hóa trong loài.\r\u003Cbr>",id:2},{answer:" Loài mới và loài gốc thường sống ở cùng một khu vực địa lý.\r\u003Cbr>",id:3}],id:59,right:2},{question:" Sự hình thành loài mới bằng lai xa và đa bội hóa chủ yếu là do cơ chế cách li nào sau đây?\r\u003Cbr>",answers:[{answer:" Các li tập tính.\r\u003Cbr>",id:0},{answer:" Cách li sinh thái.\r\u003Cbr>",id:1},{answer:" Cách li mùa vụ.\r\u003Cbr>",id:2},{answer:" Cách li sau hợp tử.\r\u003Cbr>",id:3}],id:60,right:3},{question:" Phần lớn các loài thực vật có hoa và dương xỉ được hình thành bằng cơ chế?\r\u003Cbr>",answers:[{answer:" Cách li địa lý.\r\u003Cbr>",id:0},{answer:" Cách li sinh thái.\r\u003Cbr>",id:1},{answer:" Cách li tập tính.\r\u003Cbr>",id:2},{answer:" Lai xa và đa bội hóa.\r\u003Cbr>",id:3}],id:61,right:3},{question:" Trong một hồ ở Châu Phi có 2 loài cá khác nhau về màu sắc: một loài màu đỏ, một loại màu xanh, chúng cách ly sinh sản với nhau. Tuy nhiên khi nuôi 2 loài cá trên trong bể có chiếu ánh sáng đơn sắc làm cho chúng có cùng màu thì các cá thể của 2 loài này lại giao phối với nhau và sinh con. Hai loài này được hình thành bởi cơ chế cách li nào sau đây?\r\u003Cbr>",answers:[{answer:" Cách li sinh thái.\r\u003Cbr>",id:0},{answer:" Cách li cơ học.\r\u003Cbr>",id:1},{answer:" Cách li địa lý.\r\u003Cbr>",id:2},{answer:" Cách li tập tính.\r\u003Cbr>",id:3}],id:62,right:3},{question:" Khi nói về quá trình hình thành loài mới, phát biểu nào sau đây đúng?\r\u003Cbr>",answers:[{answer:" Quá trình hình thành loài mới chỉ diễn ra trong cùng khu vực địa lý.\r\u003Cbr>",id:0},{answer:" Hình thành loài mới bằng cách li địa lý có thể có sự tham gia của các yếu tố ngẫu nhiên.\r\u003Cbr>",id:1},{answer:" Hình thành loài mới bằng cách li sinh thái là con đường hình thành loài nhanh nhất.\r\u003Cbr>",id:2},{answer:" Hình thành loài mới bằng cơ chế lai xa và đa bội hóa chỉ diễn ra ở động vật.\r\u003Cbr>",id:3}],id:63,right:1},{question:" Trong cùng một khu vực địa lí thường có sự hình thành loài bằng con đường sinh thái. Đặc điểm của quá trình này là?\r\u003Cbr>",answers:[{answer:" Chỉ xảy ra ở thực vật mà không xảy ra ở động vật.\r\u003Cbr>",id:0},{answer:" Sự hình thành loài mới luôn xảy ra nhanh chóng trong tự nhiên.\r\u003Cbr>",id:1},{answer:" Không có sự tham gia của các nhân tố tiến hóa.\r\u003Cbr>",id:2},{answer:" Có sự tích lũy các đột biến nhỏ trong quá trình tiến hóa.\r\u003Cbr>",id:3}],id:64,right:3},{question:" Phát biểu nào sau đây là đúng khi nói về môi trường sống của sinh vật?  \r\u003Cbr>",answers:[{answer:" Môi trường là nơi sống của sinh vật, bao gồm tất cả các nhân tố vô sinh và hữu sinh ở xung quanh sinh vật, có tác  động trực tiếp, gián tiếp tới sinh vật.  \r\u003Cbr>",id:0},{answer:" Môi trường bao gồm tất cả các nhân tố ở xung quanh sinh vật, có tác động trực tiếp, gián tiếp tới sinh vật, làm ảnh  hưởng tới sự tồn tại, sinh trưởng, phát triển và những hoạt động khác của sinh vật.  \r\u003Cbr>",id:1},{answer:" Môi trường là nơi sống của sinh vật, bao gồm tất cả các nhân tố vô sinh xung quanh sinh vật.\r\u003Cbr>",id:2},{answer:" Môi trường là nơi sống của sinh vật, bao gồm tất cả các nhân tố hữu sinh xung quanh sinh vật.  \r\u003Cbr>",id:3}],id:65,right:1},{question:" Môi trường sống của sinh vật gồm các loại môi trường:  \r\u003Cbr>",answers:[{answer:" Đất - nước - không khí\r\u003Cbr>",id:0},{answer:" Đất - nước - không khí - sinh vật\r\u003Cbr>",id:1},{answer:" Đất - nước - không khí - trên cạn\r\u003Cbr>",id:2},{answer:" Đất - nước - trên cạn - sinh vật  \r\u003Cbr>",id:3}],id:66,right:3},{question:" Phát biểu nào là không đúng khi nói về sự tác động của các nhân tố sinh thái lên sinh vật?  \r\u003Cbr>",answers:[{answer:" Cùng một lúc, tổ hợp các nhân tố sinh thái cùng tác động đồng thời lên sinh vật tạo nên tác động tổng hợp  \r\u003Cbr>",id:0},{answer:" Các loài khác nhau sẽ phản ứng như nhau với tác động như nhau của một nhân tố sinh thái  \r\u003Cbr>",id:1},{answer:" Trong các giai đoạn khác nhau hay trạng thái sinh lí khác nhau thì cơ thể phản ứng khác nhau với tác động như  nhau của cùng một nhân tố sinh thái  \r\u003Cbr>",id:2},{answer:" Các nhân tố sinh thái khi tác động lên cơ thể có thể gây tăng cường hoặc kìm hãm nhau  \r\u003Cbr>",id:3}],id:67,right:1},{question:" Khoảng thuận lợi là khoảng giá trị của các nhân tố sinh thái mà  \r\u003Cbr>",answers:[{answer:" ở đó sinh vật sinh sản tốt nhất.  \r\u003Cbr>",id:0},{answer:" ở mức phù hợp nhất để sinh vật thực hiện chức năng sống tốt nhất.  \r\u003Cbr>",id:1},{answer:" giúp sinh vật chống chịu tốt nhất với môi trường.  \r\u003Cbr>",id:2},{answer:" ở đó sinh vật sinh trưởng, phát triển tốt nhất.  \r\u003Cbr>",id:3}],id:68,right:1},{question:" Giới hạn sinh thái là gì?  \r\u003Cbr>",answers:[{answer:" Là giới hạn chịu đựng của sinh vật đối với nhiều nhân tố sinh thái của môi trường, nằm ngoài giới hạn sinh thái, sinh  vật không thể tồn tại được.  \r\u003Cbr>",id:0},{answer:" Là giới hạn chịu đựng của sinh vật đối với một hoặc một số nhân tố sinh thái của môi trường, nằm ngoài giới hạn  sinh thái, sinh vật không thể tồn tại được.  \r\u003Cbr>",id:1},{answer:" Là khoảng giá trị xác định của một số nhân tố sinh thái mà trong khoảng đó sinh vật có thể tồn tại và phát triển theo  thời gian.  \r\u003Cbr>",id:2},{answer:" Là giới hạn chịu đựng của sinh vật đối với một số nhân tố sinh thái của môi trường; nằm ngoài giới hạn sinh thái,  sinh vật không thể tồn tại được.  \r\u003Cbr>",id:3}],id:69,right:2},{question:" Khoảng giá trị xác định của một nhân tố sinh thái mà trong khoảng đó sinh vật có thể tồn tại và phát triển ổn  định theo thời gian được gọi là:  \r\u003Cbr>",answers:[{answer:" Môi trường\r\u003Cbr>",id:0},{answer:" Giới hạn sinh thái  \r\u003Cbr>",id:1},{answer:" Ổ sinh thái\r\u003Cbr>",id:2},{answer:" Sinh cảnh  \r\u003Cbr>",id:3}],id:70,right:1},{question:" Nhân tố sinh thái là  \r\u003Cbr>",answers:[{answer:" tất cả những nhân tố môi trường, ảnh hưởng trực tiếp hoặc gián tiếp tới đời sống của sinh vật.\r\u003Cbr>",id:0},{answer:" tất cả những nhân tố vật lí và hóa học của môi trường xung quanh sinh vật (nhân tố vô sinh).\r\u003Cbr>",id:1},{answer:" những mối quan hệ giữa một sinh vật (hoặc nhóm sinh vật) này với một sinh vật (hoặc nhóm sinh vật) khác sống  xung quanh (nhân tố hữu sinh).  \r\u003Cbr>",id:2},{answer:" những tác động của con người đến môi trường.  \r\u003Cbr>",id:3}],id:71,right:0},{question:" Trên một cây to, có nhiều loài chim sinh sống, có loài sống trên cao, có loài sống dưới thấp, hình thành các...  khác nhau \r\u003Cbr>",answers:[{answer:" Quần thể\r\u003Cbr>",id:0},{answer:" Ổ sinh thái\r\u003Cbr>",id:1},{answer:" Quần xã\r\u003Cbr>",id:2},{answer:" Sinh cảnh  \r\u003Cbr>",id:3}],id:72,right:1},{question:" Sinh vật có khả năng phân bố rộng trong trường hợp nào sau đây?  \r\u003Cbr>",answers:[{answer:" Điểm gây chết thấp\r\u003Cbr>",id:0},{answer:" Khoảng thuận lợi rộng  \r\u003Cbr>",id:1},{answer:" Khoảng chống chịu rộng\r\u003Cbr>",id:2},{answer:" Ổ sinh thái rộng  \r\u003Cbr>",id:3}],id:73,right:3},{question:" Trong các phát biểu sau:  \r\u003Cbr> I. Ổ sinh thái của một loài là nơi ở của loài đó.  \r\u003Cbr> II. Ổ sinh thái đặc trưng cho loài.  \r\u003Cbr> III. Các loài sống trong một sinh cảnh và cùng sử dụng một nguồn thức ăn thì chúng có xu hướng phân li ổ sinh thái.\r\u003Cbr> IV. Kích thước thức ăn, loại thức ăn của mỗi loài tạo nên các ổ sinh thái về dinh dưỡng.  \r\u003Cbr> Có bao nhiêu phát biểu đúng khi nói về ổ sinh thái? \r\u003Cbr>",answers:[{answer:" 1.\r\u003Cbr>",id:0},{answer:" 2.\r\u003Cbr>",id:1},{answer:" 3.\r\u003Cbr>",id:2},{answer:" 4.  \r\u003Cbr>",id:3}],id:74,right:2},{question:" Phần lớn thực vật sống ở vùng nhiệt đới quang hợp tốt nhất ở nhiệt độ 20°C - 30°C, khi nhiệt độ xuống dưới  0°C và cao hơn 40°C cây trồng ngừng quang hợp. Trong các phát biểu sau:  \r\u003Cbr> 1. 20°C - 30°C được gọi là giới hạn sinh thái.  \r\u003Cbr> 2. 20°C - 30°C được gọi là khoảng thuận lợi.  \r\u003Cbr> 3. 0°C - 40°C được gọi là giới hạn sinh thái về nhiệt độ.  \r\u003Cbr> 4. 0°C - 40°C được gọi là khoả
