:8,right:1},{question:" Theo quan niệm hiện đại, loại biến dị nào sau đây là nguồn nguyên liệu sơ cấp cho quá trình tiến hóa?\u003Cbr>",answers:[{answer:" Biến dị tổ hợp.\u003Cbr>",id:0},{answer:" Thường biến.\u003Cbr>",id:1},{answer:" Yếu tố ngẫu nhiên.\u003Cbr>",id:2},{answer:" Đột biến gen.\u003Cbr>",id:3}],id:9,right:3},{question:" Theo quan niệm của thuyết tiến hóa hiện đại, phát biểu nào sau đây về chọn lọc tự nhiên là SAI?\u003Cbr>",answers:[{answer:" Chon lọc tự nhiên tác động trực tiếp lên kiểu hình và qua đó gián tiếp tác động lên vốn gen của quần thể.\u003Cbr>",id:0},{answer:" Chọn lọc tự nhiên không bao giờ loại bỏ hết alen lặn ra khỏi quần thể.\u003Cbr>",id:1},{answer:" Kết quả của chọn lọc tự nhiên là hình thành cá thể mang kiểu hình thích nghi với môi trường.\u003Cbr>",id:2},{answer:" Chọn lọc chống lại alen trội có thể nhanh chóng làm thay đổi tần số alen của quần thể.\u003Cbr>",id:3}],id:10,right:2},{question:" Trong quá trình tiến hóa, nhân tố làm thay đổi tần số alen của quần thể chậm nhất là?\u003Cbr>",answers:[{answer:" Đột biến.\u003Cbr>",id:0},{answer:" Các yếu tố ngẫu nhiên.\u003Cbr>",id:1},{answer:" Chọn lọc tự nhiên.\u003Cbr>",id:2},{answer:" Di - nhập gen.\u003Cbr>",id:3}],id:11,right:0},{question:" Theo quan niệm của thuyết tiến hóa tổng hợp, phát biểu nào sau đây sai?\u003Cbr>",answers:[{answer:" Hình thành loài nhờ cơ chế lai xa và đa bội hóa là con đường hình thành loài nhanh nhất.\u003Cbr>",id:0},{answer:" Quần thể sẽ không tiến hóa nếu tần số alen và thành phần kiểu gen của quần thể được duy trì không đổi từ thế hệ này sang thế hệ khác.\u003Cbr>",id:1},{answer:" Các loài sinh sản vô tính tạo ra số lượng cá thể con cháu rất nhiều và nhanh nên khi môi trường có biến động mạnh sẽ không bị chọn lọc tự nhiên đào thải hàng loạt.\u003Cbr>",id:2},{answer:" Tiến hóa nhỏ và tiến hóa lớn không độc lập nhau mà liên quan mật thiết.\u003Cbr>",id:3}],id:12,right:2},{question:" Các nhân tố tiến hóa nào sau đây vừa làm thay đổi tần số alen vừa có thể
