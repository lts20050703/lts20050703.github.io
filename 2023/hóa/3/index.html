E)\u003Csub\u003E2\u003C\u002Fsub\u003E 0,3M và AgNO\u003Csub\u003E3\u003C\u002Fsub\u003E 0,3M thu đựơc chất rắn A; Cho A tác dụng với dd HCl dư thu được 0,336 lít H\u003Csub\u003E2\u003C\u002Fsub\u003E (đktc). Tính m và khối lượng chất rắn A?\u003Cbr\u003E",answers:[{answer:" 1,08 và 5,16g",id:0},{answer:" 1,08 và 5,43g",id:1},{answer:" 0,54 và 5,16g",id:2},{answer:" 8,1 và 5,24g\u003Cbr\u003E",id:3}],id:27,right:1},{question:" Cho 2,7 gam kim loại Al tác dụng với dung dịch NaOH dư, sau phản ứng hoàn toàn thu được V lít khí H\u003Csub\u003E2\u003C\u002Fsub\u003E (đktc). Giá trị của V là\u003Cbr\u003E",answers:[{answer:" 3,36.",id:0},{answer:" 4,48.",id:1},{answer:" 1,12.",id:2},{answer:" 2,24.\u003Cbr\u003E",id:3}],id:28,right:0},{question:" Nung 6,0 gam hỗn hợp Al và Fe trong không khí, thu được 8,4 gam hỗn hợp X chỉ chứa các oxit. Hòa tan hoàn toàn X cần vừa đủ V ml dung dịch HCl 1M. Giá trị V là\u003Cbr\u003E",answers:[{answer:" 200.",id:0},{answer:" 150.",id:1},{answer:" 300.",id:2},{answer:" 400.\u003Cbr\u003E",id:3}],id:29,right:2},{question:" Hòa tan hoàn toàn Fe\u003Csub\u003E3\u003C\u002Fsub\u003EO\u003Csub\u003E4\u003C\u002Fsub\u003E trong dung dịch H\u003Csub\u003E2\u003C\u002Fsub\u003ESO\u003Csub\u003E4\u003C\u002Fsub\u003E (loãng, dư), thu được dung dịch X. Chất nào sau đây không phản ứng với dung dịch X?\u003Cbr\u003E",answers:[{answer:" KMnO\u003Csub\u003E4\u003C\u002Fsub\u003E.",id:0},{answer:" KNO\u003Csub\u003E3\u003C\u002Fsub\u003E.",id:1},{answer:" NaCl.",id:2},{answer:" Cu.\u003Cbr\u003E",id:3}],id:30,right:2},{question:" Phát biểu nào sau đây là đúng?\u003Cbr\u003E",answers:[{answer:" Kim loại Na tác dụng với dung dịch AlCl\u003Csub\u003E3\u003C\u002Fsub\u003E, thu được kim loại Al.\u003Cbr\u003E",id:0},{answer:" Hỗn hợp gồm Na\u003Csub\u003E2\u003C\u002Fsub\u003EO và Al\u003Csub\u003E2\u003C\u002Fsub\u003EO\u003Csub\u003E3\u003C\u002Fsub\u003E (tỉ lệ mol 1 : 1) tan được hoàn toàn trong nước dư.\u003Cbr\u003E",id:1},{answer:" Thạch cao sống dùng để nặn tượng, bó bột khi gãy xương.\u003Cbr\u003E",id:2},{answer:" Điện phân MgCl\u003Csub\u003E2\u003C\u002Fsub\u003E nóng chảy, thu được khí Cl\u003Csub\u003E2\u003C\u002Fsub\u003E ở catot.\u003Cbr\u003E",id:3}],id:31,right:1},{question:" Hòa tan hoàn toàn m gam Al vào dung dịch HNO\u003Csub\u003E3\u003C\u002Fsub\u003E thu được 0,01 mol khí NO là sản phẩm khử duy nhất.\u003Cbr\u003E Giá trị của m là\u003Cbr\u003E",answers:[{answer:" 1,35.",id:0},{answer:" 0,54.",id:1},{answer:" 0,27.",id:2},{answer:" 0,81.\u003Cbr\u003E",id:3}],id:32,right:2},{question:" Cho 2,16 gam Al tác dụng với dung dịch HNO\u003Csub\u003E3\u003C\u002Fsub\u003E (dư). Sau khi phản ứng xảy ra hoàn toàn thu được 0,224 lít khí NO (ở đktc) và dung dịch X. Khối lượng muối khan thu được khi làm bay hơi dung dịch X là\u003Cbr\u003E",answers:[{answer:" 6,12 gam.",id:0},{answer:" 4,02 gam.",id:1},{answer:" 17,04 gam.",id:2},{answer:" 19,14 gam.\u003Cbr\u003E",id:3}],id:33,right:3},{question:" Cho sơ đồ các phản ứng sau:\u003Cbr\u003E (a) X\u003Csub\u003E1\u003C\u002Fsub\u003E + H\u003Csub\u003E2\u003C\u002Fsub\u003EO → X\u003Csub\u003E2\u003C\u002Fsub\u003E + X\u003Csub\u003E3\u003C\u002Fsub\u003E↑ + H\u003Csub\u003E2\u003C\u002Fsub\u003E↑ (Điện phân dung dịch có màng ngăn).\u003Cbr\u003E (b) X\u003Csub\u003E2\u003C\u002Fsub\u003E + X\u003Csub\u003E4\u003C\u002Fsub\u003E → CaCO\u003Csub\u003E3\u003C\u002Fsub\u003E + Na\u003Csub\u003E2\u003C\u002Fsub\u003ECO\u003Csub\u003E3\u003C\u002Fsub\u003E + H\u003Csub\u003E2\u003C\u002Fsub\u003EO\u003Cbr\u003E (c) X\u003Csub\u003E2\u003C\u002Fsub\u003E + X\u003Csub\u003E3\u003C\u002Fsub\u003E → X\u003Csub\u003E1\u003C\u002Fsub\u003E + X\u003Csub\u003E5\u003C\u002Fsub\u003E + H\u003Csub\u003E2\u003C\u002Fsub\u003EO.\u003Cbr\u003E (d) X\u003Csub\u003E4\u003C\u002Fsub\u003E + X\u003Csub\u003E6\u003C\u002Fsub\u003E → CaSO\u003Csub\u003E4\u003C\u002Fsub\u003E + Na\u003Csub\u003E2\u003C\u002Fsub\u003ESO\u003Csub\u003E4\u003C\u002Fsub\u003E + CO\u003Csub\u003E2\u003C\u002Fsub\u003E + H\u003Csub\u003E2\u003C\u002Fsub\u003EO.\u003Cbr\u003E Các chất X\u003Csub\u003E5\u003C\u002Fsub\u003E, X\u003Csub\u003E6\u003C\u002Fsub\u003E thỏa mãn sơ đồ trên lần lượt là\u003Cbr\u003E",answers:[{answer:" NaClO, H\u003Csub\u003E2\u003C\u002Fsub\u003ESO\u003Csub\u003E4\u003C\u002Fsub\u003E.",id:0},{answer:" Ca(HCO\u003Csub\u003E3\u003C\u002Fsub\u003E)\u003Csub\u003E2\u003C\u002Fsub\u003E, NaHSO\u003Csub\u003E4\u003C\u002Fsub\u003E.\u003Cbr\u003E",id:1},{answer:" Ca(HCO\u003Csub\u003E3\u003C\u002Fsub\u003E)\u003Csub\u003E2\u003C\u002Fsub\u003E, H\u003Csub\u003E2\u003C\u002Fsub\u003ESO\u003Csub\u003E4\u003C\u002Fsub\u003E.",id:2},{answer:" NaClO, NaHSO\u003Csub\u003E4\u003C\u002Fsub\u003E.\u003Cbr\u003E",id:3}],id:34,right:3},{question:" Theo TCVN 5502: 2003, dựa vào độ cứng của nước (được xác định bằng tổng hàm lượng Ca\u003Csup\u003E2\u003C\u002Fsup\u003E\u003Csup\u003E+\u003C\u002Fsup\u003E và Mg\u003Csup\u003E2\u003C\u002Fsup\u003E\u003Csup\u003E+\u003C\u002Fsup\u003E quy đổi về khối lượng CaCO\u003Csub\u003E3\u003C\u002Fsub\u003E, có trong 1 lít nước), người ta có thể phân nước thành 4 loại:\u003Cbr\u003E \u003Ctable\u003E\u003Ctr\u003E\u003Ctd\u003EPhân loại nước\u003C\u002Ftd\u003E\u003Ctd\u003EMềm\u003C\u002Ftd\u003E\u003Ctd\u003EHơi cứng\u003C\u002Ftd\u003E\u003Ctd\u003ECứng\u003C\u002Ftd\u003E\u003Ctd\u003ERất cứng\u003C\u002Ftd\u003E\u003C\u002Ftr\u003E\u003Ctr\u003E\u003Ctd\u003EĐộ cứng (mg CaCO\u003Csub\u003E3\u003C\u002Fsub\u003E\u002Flít)\u003C\u002Ftd\u003E\u003Ctd\u003E0 - 50\u003C\u002Ftd\u003E\u003Ctd\u003E50 - 150\u003C\u002Ftd\u003E\u003Ctd\u003E150 - 300\u003C\u002Ftd\u003E\u003Ctd\u003E&gt;300\u003C\u002Ftd\u003E\u003C\u002Ftr\u003E\u003C\u002Ftable\u003E\u003Cbr\u003E Từ một mẫu nước có chứa các ion (Mg\u003Csup\u003E2\u003C\u002Fsup\u003E\u003Csup\u003E+\u003C\u002Fsup\u003E, Ca\u003Csup\u003E2\u003C\u002Fsup\u003E\u003Csup\u003E+\u003C\u002Fsup\u003E, SO\u003Csub\u003E4\u003C\u002Fsub\u003E2\u003Csup\u003E-\u003C\u002Fsup\u003E 0,0004M, HCO\u003Csub\u003E3\u003C\u002Fsub\u003E\u003Csup\u003E-\u003C\u002Fsup\u003E 0,00042M, Cl\u003Csup\u003E-\u003C\u002Fsup\u003E 0,0003M), người ta có thể tính được giá trị độ cứng của mẫu nước. Hãy chọn nhận định đúng trong các nhận định sau\u003Cbr\u003E",answers:[{answer:" Độ cứng của nước là 76 mg\u002Fl. Mẫu nước thuộc loại nước hơi cứng.\u003Cbr\u003E",id:0},{answer:" Độ cứng của nước là 152 mg\u002Fl. Mẫu nước thuộc loại nước cứng.\u003Cbr\u003E",id:1},{answer:" Độ cứng của nước là 40 mg\u002Fl. Mẫu nước thuộc loại nước mềm.\u003Cbr\u003E",id:2},{answer:" Độ cứng của nước là 400 mg\u002Fl. Mẫu nước thuộc loại nước rất cứng.\u003Cbr\u003E",id:3}],id:35,right:0},{question:" Cho các phát biểu sau:\u003Cbr\u003E (a) Cho dung dịch NH\u003Csub\u003E3\u003C\u002Fsub\u003E vào dung dịch AlCl\u003Csub\u003E3\u003C\u002Fsub\u003E có xuất hiện kết tủa.\u003Cbr\u003E (b) Nhiệt phân hoàn toàn Cu(NO\u003Csub\u003E3\u003C\u002Fsub\u003E)\u003Csub\u003E2\u003C\u002Fsub\u003E tạo thành Cu.\u003Cbr\u003E (c) Hỗn hợp Na\u003Csub\u003E2\u003C\u002Fsub\u003EO và Al (tỉ lệ mol 1:1) tan hết trong nước dư.\u003Cbr\u003E (d) Trong công nghiệp dược phẩm, NaHCO\u003Csub\u003E3\u003C\u002Fsub\u003E được dùng để điều chế thuốc đau dạ dày.\u003Cbr\u003E (e) Trong công nghiệp, Al được sản xuất bằng phương pháp điện phân nóng chảy AlCl\u003Csub\u003E3\u003C\u002Fsub\u003E.\u003Cbr\u003E Số phát biểu đúng là\u003Cbr\u003E",answers:[{answer:" 4.",id:0},{answer:" 5.",id:1},{answer:" 2.",id:2},{answer:" 3.\u003Cbr\u003E",id:3}],id:36,right:3},{question:" Khối lượng dung dịch HNO\u003Csub\u003E3\u003C\u002Fsub\u003E 6,3% loãng tối thiểu để hòa tan hoàn toàn hỗn hợp gồm 10,5g Fe và 2,7g Al là bao nhiêu? Biết sản phẩm khử chỉ là NO.\u003Cbr\u003E",answers:[{answer:" 420g",id:0},{answer:" 900g",id:1},{answer:" 700g",id:2},{answer:" 2700g\u003Cbr\u003E",id:3}],id:37,right:1},{question:" Nung hỗn hợp gồm 0,12 mol Al và 0,04 mol Fe\u003Csub\u003E3\u003C\u002Fsub\u003EO\u003Csub\u003E4\u003C\u002Fsub\u003E một thời gian, thu được hỗn hợp rắn X. Hòa tan hoàn toàn X trong dung dịch HCl dư thu được 0,15 mol khí H\u003Csub\u003E2\u003C\u002Fsub\u003E và m gam muối. Giá trị của m là\u003Cbr\u003E",answers:[{answer:" 34,10.",id:0},{answer:" 32,58.",id:1},{answer:" 31,97.",id:2},{answer:" 33,39.\u003Cbr\u003E",id:3}],id:38,right:2},{question:" Hàn nhiệt là phương pháp hàn dựa trên cơ sở của phản ứng tỏa nhiệt giữa một oxit kim loại với một kim loại khác có ái lực hóa học với oxi mạnh hơn. Thông dụng nhất là phản ứng giữa nhôm và oxit sắt từ (Fe\u003Csub\u003E3\u003C\u002Fsub\u003EO\u003Csub\u003E4\u003C\u002Fsub\u003E). Phản ứng xảy ra khi nung nóng một lượng nhỏ hỗn hợp đến nhiệt độ khoảng 1200 - 1300°C, sau đó phản ứng tiếp tục được duy trì nhờ nhiệt độ của phản ứng và lan nhanh ra toàn khối hỗn hợp làm nhiệt độ tăng lên đến 3000°C, nung nóng chảy sắt tạo thành thép lỏng và làm nóng chảy các tạp chất tạo thành xỉ lỏng.\u003Cbr\u003E \u003Cimg src=\"\u002F2023\u002Fhoa340.png\"\u003E\u003Cbr\u003E 1. Chi tiết hàn; 2. Khuôn; 3. Hệ thống rót; 4. Nồi chứa; 5. Xỉ; 6. Thép lỏng\u003Cbr\u003E Tiến hành mở lỗ rót ở đáy nồi phản ứng để rót thép lỏng vào khuôn. Thép lỏng có nhiệt độ cao nung chảy mép hàn, sau đó đông đặc tạo thành mối hàn. Cho biết khối lượng riêng của sắt là 7,87 g\u002Fcm³ và lượng sắt trong mối hàn bằng 90% lượng sắt được điều chế ra và các chất được lấy đúng theo hệ số tỉ lượng. Khối lượng gần nhất của hỗn hợp tecmit cần lấy để có thể hàn được vết nứt gãy của đường ray có thể tích là 10 cm³ là\u003Cbr\u003E",answers:[{answer:" 158 gam.",id:0},{answer:" 138 gam.",id:1},{answer:" 128 gam.",id:2},{answer:" 148 gam.\u003Cbr\u003E",id:3}],id:39,right:0}],id:0}],azota:"https:\u002F\u002Fazota.vn\u002Fde-thi\u002Fkhj0xz",id:"3",word:""},"uses":{"params":["subject","id"]}}];
