ng không tham gia hoặc ít tham gia vào quá trình sinh hóa của các thể sinh vật và tích lũy trong cơ thể sinh vật. Do độ hòa tan trong nước của các kim loại này cao nên chúng có thể hấp thụ tốt vào cơ thể sinh vật, nếu sự tích lũy diễn ra với nồng độ cao và vượt quá giới hạn cho phép có thể gây ra nhiễm độc và tổn hại trầm trọng đến cơ thể sinh vật... Em hãy đề xuất một chất hóa học rẻ tiền có thể loại bỏ các ion kim loại trên trong nguồn nước.\u003Cbr>",answers:[{answer:" NaCl",id:0},{answer:" CaCO\u003Csub>3\u003C/sub>",id:1},{answer:" Ca(OH)\u003Csub>2\u003C/sub>",id:2},{answer:" KNO\u003Csub>3\u003C/sub>.\u003Cbr>",id:3}],id:29,right:2},{question:" Có bao nhiêu thí nghiệm sau thu được kết tủa Al(OH)\u003Csub>3\u003C/sub>:\u003Cbr> (1) Cho từ từ dung dịch NaOH dư vào dd AlCl\u003Csub>3\u003C/sub>.\u003Cbr> (2) Cho nhanh dung dịch HCl dư vào dd AlCl\u003Csub>3\u003C/sub>\u003Cbr> *(3) Cho dung dịch NH\u003Csub>3\u003C/sub> dư vào dung dịch AlCl\u003Csub>3\u003C/sub>.\u003Cbr> (4) Cho dung dịch HCl dư vào dung dịch NaAlO\u003Csub>2\u003C/sub>.\u003Cbr> *(5) Thổi CO\u003Csub>2\u003C/sub> dư vào dung dịch NaAlO\u003Csub>2\u003C/sub>.\u003Cbr>",answers:[{answer:" 1",id:0},{answer:" 2.",id:1},{answer:" 3.",id:2},{answer:" 4\u003Cbr>",id:3}],id:30,right:1},{question:" Cho các phát biểu sau:\u003Cbr> *(a) Kim loại Fe tan hoàn toàn trong dung dịch HNO\u003Csub>3\u003C/sub> đặc, nóng.\u003Cbr> *(b) Các kim loại K, Na, Ba đều tác dụng với nước ở điều kiện thường.\u003Cbr> *(c) Nhúng thanh kim loại Zn vào dung dịch Cu(NO\u003Csub>3\u003C/sub>)\u003Csub>2\u003C/sub> có xảy ra ăn mòn điện hóa học.\u003Cbr> (d) Cho dung dịch Na\u003Csub>2\u003C/sub>SO\u003Csub>4\u003C/sub> loãng vào dung dịch BaCl\u003Csub>2\u003C/sub> thu được kết tủa gồm hai chất.\u003Cbr> *(e) Cho a mol P\u003Csub>2\u003C/sub>O\u003Csub>5\u003C/sub> vào dung dịch chứa 4,5a mol NaOH thu được dung dịch chứa hỗn hợp muối.\u003Cbr> *(f) Cu tan trong dung dịch FeCl\u003Csub>3\u003C/sub> dư.\u003Cbr> Số phát biểu đúng là\u003Cbr>",answers:[{answer:" 3.",id:0},{answer:" 2.",id:1},{answer:" 5.",id:2},{answer:" 4.\u003Cbr>",id:3}],id:31,right:2},{question:" Cho m gam hỗn hợp MgCO\u003Csub>3\u003C/sub>, Na\u003Csub>2\u003C/sub>CO\u003Csub>3\u003C/sub>, K\u003Csub>2\u003C/sub>CO\u003Csub>3\u003C/sub> và CaCO\u003Csub>3\u003C/sub> tác dụng hoàn toàn với dung dịch HCl dư thấy có V lít khí cacbonic thoát ra. Đem cô cạn dung dịch sau phản ứng thì thu được (m+4,4) gam muối khan. Giá trị của V là\u003Cbr>",answers:[{answer:" 17,92.",id:0},{answer:" 6,72.",id:1},{answer:" 8,96.",id:2},{answer:" 11,2.\u003Cbr>",id:3}],id:32,right:2},{question:" Cho sơ đồ phản ứng: Al\u003Csub>2\u003C/sub>(SO\u003Csub>4\u003C/sub>)\u003Csub>3\u003C/sub> → X → Y → Al.\u003Cbr> Trong sơ đồ trên, mỗi mũi tên là một phản ứng, các chất X, Y lần lượt là những chất nào sau đây?\u003Cbr>",answers:[{answer:" Al\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub> và Al(OH)\u003Csub>3\u003C/sub>",id:0},{answer:" Al(OH)\u003Csub>3\u003C/sub> và Al\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub>\u003Cbr>",id:1},{answer:" Al(OH)\u003Csub>3\u003C/sub> và NaAlO\u003Csub>2\u003C/sub>",id:2},{answer:" NaAlO\u003Csub>2\u003C/sub> và Al(OH)\u003Csub>3\u003C/sub>\u003Cbr>",id:3}],id:33,right:1},{question:" Thực hiện các thí nghiệm sau:\u003Cbr> *(a) Cho dung dịch KHSO\u003Csub>4\u003C/sub> vào dung dịch Ba(HCO\u003Csub>3\u003C/sub>)\u003Csub>2\u003C/sub>.\u003Cbr> *(b) Cho dung dịch NaOH vào dung dịch Ca(HCO\u003Csub>3\u003C/sub>)\u003Csub>2\u003C/sub>.\u003Cbr> *(c) Cho dung dịch NaHCO\u003Csub>3\u003C/sub> vào dung dịch CaCl\u003Csub>2\u003C/sub> đun nóng.\u003Cbr> *(d) Cho hỗn hợp Cu và Fe\u003Csub>3\u003C/sub>O\u003Csub>4\u003C/sub> (tỉ lệ mol 2:1) vào lượng dư dung dịch HCl.\u003Cbr> *(e) Cho kim loại Ba vào dung dịch CuCl\u003Csub>2\u003C/sub>.\u003Cbr> (f) Cho hỗn hợp Cu và KNO\u003Csub>3\u003C/sub> (tỉ lệ mol 3:2) vào dung dịch H\u003Csub>2\u003C/sub>SO\u003Csub>4\u003C/sub> loãng dư.\u003Cbr> Sau khi các phản ứng kết thúc, số thí nghiệm có chất rắn sau phản ứng hay là\u003Cbr>",answers:[{answer:" 5.",id:0},{answer:" 4.",id:1},{answer:" 3.",id:2},{answer:" 6.\u003Cbr>",id:3}],id:34,right:0},{question:" Trộn 6,48g Al với 20g Fe\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub>. Thực hiện phản ứng nhiệt nhôm thu được chất rắn",answers:[{answer:" 100%",id:0},{answer:" 85%",id:1},{answer:" 80%",id:2},{answer:" 83,3%\u003Cbr>",id:3}],id:35,right:2},{question:" Cần bao nhiêu tấn quặng manhetit chứa 80% Fe\u003Csub>3\u003C/sub>O\u003Csub>4\u003C/sub> để có thể luyện được 800 tấn gang có hàm lượng sắt 95%. Lượng sắt bị hao hụt trong sản xuất là 1%.\u003Cbr>",answers:[{answer:" 1325,16 tấn.",id:0},{answer:" 3975,48 tấn.",id:1},{answer:" 131,90 tấn.",id:2},{answer:" 1060,13 tấn.\u003Cbr>",id:3}],id:36,right:0},{question:" Hòa tan hoàn hoàn m gam hh Na, Na\u003Csub>2\u003C/sub>O, Ba, BaO vào nước thì thu được dd Y và 0,02 mol H\u003Csub>2\u003C/sub>. Làm các thí nghiệm khi dẫn khí CO\u003Csub>2\u003C/sub> vào dung dịch Y cho ta bảng giá trị sau. Hãy tìm m?\u003Cbr> \u003Ctable>\u003Ctr>\u003Ctd>Mol CO\u003Csub>2\u003C/sub>\u003C/td>\u003Ctd>0.02\u003C/td>\u003Ctd>0.04\u003C/td>\u003Ctd>0.14\u003C/td>\u003C/tr>\u003Ctr>\u003Ctd>Khối lượng kết tủa\u003C/td>\u003Ctd>2a\u003C/td>\u003Ctd>4a\u003C/td>\u003Ctd>a\u003C/td>\u003C/tr>\u003C/table>\u003Cbr> Khối lượng kết tủa 2a 4a a\u003Cbr>",answers:[{answer:" 7.97 gam",id:0},{answer:" 15.94 gam",id:1},{answer:" 3.985 gam",id:2},{answer:" 11.955 gam\u003Cbr>",id:3}],id:37,right:0},{question:" Hỗn hợp E gồm Fe, Fe\u003Csub>3\u003C/sub>O\u003Csub>4\u003C/sub>, Fe\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub> và Fe(NO\u003Csub>3\u003C/sub>)\u003Csub>2\u003C/sub>. Nung 23,84 gam E trong môi trường trơ thu được chất rắn X (chỉ gồm Fe và các oxit) và 0,12 mol khí NO\u003Csub>2\u003C/sub>. Hòa tan hết X trong dung dịch HCl nồng độ 3,65% thu được 672 ml khí H\u003Csub>2\u003C/sub> và dung dịch Y chỉ chứa muối. Cho tiếp dung dịch AgNO\u003Csub>3\u003C/sub> dư vào Y thu được 102,3 gam kết tủa gồm Ag và AgCl. Biết các phản ứng xảy ra hoàn toàn. Nồng độ phần trăm của muối FeCl\u003Csub>2\u003C/sub> trong Y gần nhất với giá trị nào sau đây?\u003Cbr>",answers:[{answer:" 3,08%.",id:0},{answer:" 3,58%.",id:1},{answer:" 3,12%.",id:2},{answer:" 2,84%.\u003Cbr>",id:3}],id:38,right:0}],id:0}],azota:"https://azota.vn/de-thi/h1wivg",id:"2",word:""},"uses":{"params":["subject","id"]}}];
