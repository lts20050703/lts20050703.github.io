 CO\u003Csub\u003E2\u003C\u002Fsub\u003E dư vào dung dịch NaAlO\u003Csub\u003E2\u003C\u002Fsub\u003E.\u003Cbr\u003E",answers:[{answer:" 1",id:0},{answer:" 2.",id:1},{answer:" 3.",id:2},{answer:" 4\u003Cbr\u003E",id:3}],id:30,right:1},{question:" Cho các phát biểu sau:\u003Cbr\u003E *(a) Kim loại Fe tan hoàn toàn trong dung dịch HNO\u003Csub\u003E3\u003C\u002Fsub\u003E đặc, nóng.\u003Cbr\u003E *(b) Các kim loại K, Na, Ba đều tác dụng với nước ở điều kiện thường.\u003Cbr\u003E *(c) Nhúng thanh kim loại Zn vào dung dịch Cu(NO\u003Csub\u003E3\u003C\u002Fsub\u003E)\u003Csub\u003E2\u003C\u002Fsub\u003E có xảy ra ăn mòn điện hóa học.\u003Cbr\u003E (d) Cho dung dịch Na\u003Csub\u003E2\u003C\u002Fsub\u003ESO\u003Csub\u003E4\u003C\u002Fsub\u003E loãng vào dung dịch BaCl\u003Csub\u003E2\u003C\u002Fsub\u003E thu được kết tủa gồm hai chất.\u003Cbr\u003E *(e) Cho a mol P\u003Csub\u003E2\u003C\u002Fsub\u003EO\u003Csub\u003E5\u003C\u002Fsub\u003E vào dung dịch chứa 4,5a mol NaOH thu được dung dịch chứa hỗn hợp muối.\u003Cbr\u003E *(f) Cu tan trong dung dịch FeCl\u003Csub\u003E3\u003C\u002Fsub\u003E dư.\u003Cbr\u003E Số phát biểu đúng là\u003Cbr\u003E",answers:[{answer:" 3.",id:0},{answer:" 2.",id:1},{answer:" 5.",id:2},{answer:" 4.\u003Cbr\u003E",id:3}],id:31,right:2},{question:" Cho m gam hỗn hợp MgCO\u003Csub\u003E3\u003C\u002Fsub\u003E, Na\u003Csub\u003E2\u003C\u002Fsub\u003ECO\u003Csub\u003E3\u003C\u002Fsub\u003E, K\u003Csub\u003E2\u003C\u002Fsub\u003ECO\u003Csub\u003E3\u003C\u002Fsub\u003E và CaCO\u003Csub\u003E3\u003C\u002Fsub\u003E tác dụng hoàn toàn với dung dịch HCl dư thấy có V lít khí cacbonic thoát ra. Đem cô cạn dung dịch sau phản ứng thì thu được (m+4,4) gam muối khan. Giá trị của V là\u003Cbr\u003E",answers:[{answer:" 17,92.",id:0},{answer:" 6,72.",id:1},{answer:" 8,96.",id:2},{answer:" 11,2.\u003Cbr\u003E",id:3}],id:32,right:2},{question:" Cho sơ đồ phản ứng: Al\u003Csub\u003E2\u003C\u002Fsub\u003E(SO\u003Csub\u003E4\u003C\u002Fsub\u003E)\u003Csub\u003E3\u003C\u002F
