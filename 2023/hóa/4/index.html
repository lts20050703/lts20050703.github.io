swer:" 5,3 tấn.",id:0},{answer:" 6,1 tấn.",id:1},{answer:" 6,5 tấn.",id:2},{answer:" 7 tấn.\u003Cbr>",id:3}],id:31,right:1},{question:" X có công thức phân tử Na\u003Csub>3\u003C/sub>AlF\u003Csub>6\u003C/sub> được thêm vào Al\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub> trong quá trình điện phân Al\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub> nóng chảy để sản xuất nhôm. Vai trò của X là: làm tăng độ dẫn điện của Al\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub> nóng chảy, làm giảm nhiệt độ nóng chảy của Al\u003Csub>2\u003C/sub>O\u003Csub>3\u003C/sub>, tạo lớp ngăn cách để bảo vệ Al nóng chảy. Vậy X có tên là gì?\u003Cbr>",answers:[{answer:" Phèn chua.",id:0},{answer:" Hemantit.",id:1},{answer:" Boxit.",id:2},{answer:" Criolit.\u003Cbr>",id:3}],id:32,right:3},{question:" Kim loại Mg tan hết trong lượng dư dung dịch nào sau đây sinh ra khí H\u003Csub>2\u003C/sub>?\u003Cbr>",answers:[{answer:" Na\u003Csub>2\u003C/sub>SO\u003Csub>4\u003C/sub>.",id:0},{answer:" NaNO\u003Csub>3\u003C/sub>.",id:1},{answer:" NaCl.",id:2},{answer:" HCl.\u003Cbr>",id:3}],id:33,right:3},{question:" Hỗn hợp X gồm 2,7 gam Al và 5,6 gam Fe. Cho X vào 500 ml dd AgNO\u003Csub>3\u003C/sub> 1,1 M. Sau khi pư hoàn toàn thu được dd Y. Tính lượng chất rắn sau pư.\u003Cbr>",answers:[{answer:" 38g",id:0},{answer:" 40 gam",id:1},{answer:" 59,4 gam",id:2},{answer:" 37,8 g\u003Cbr>",id:3}],id:34,right:2},{question:" Hòa tan hoàn toàn 13,44 gam kim loại R bằng 400 ml dd H\u003Csub>2\u003C/sub>SO\u003Csub>4\u003C/sub> 0,8 M. Để trung hòa axit dư cần dùng 200 ml dung dịch NaOH 0,8 M. Tìm kim loại R:\u003Cbr>",answers:[{answer:" Zn.",id:0},{answer:" Fe.",id:1},{answer:" Mg.",id:2},{answer:" Ni.\u003Cbr>",id:3}],id:35,right:1},{question:" Thực hiện các thí nghiệm sau:\u003Cbr> (a) Cho dung dịch KHSO\u003Csub>4\u003C/sub> vào dung dịch Ba(HCO\u003Csub>3\u003C/sub>)\u003Csub>2\u003C/sub>.\u003Cbr> (b) Cho dung dịch NH\u003Csub>4\u003C/sub>Cl vào dung dịch NaOH đun nóng.\u003Cbr> (c) Cho dung dịch NaHCO\u003Csub>3\u003C/sub> vào dung dịch CaCl\u003Csub>2\u003C/sub> đun nóng.\u003Cbr> (d) Cho dung dịch AlCl\u003Csub>3\u003C/sub> vào lượng dư dung dịch Ba(OH)\u003Csub>2\u003C/sub>.\u003Cbr> (e) Cho kim loại Na vào dung dịch CuCl\u003Csub>2\u003C/sub>.\u003Cbr> Sau khi các phản ứng kết thúc, số thí nghiệm sinh ra chất khí là\u003Cbr>",answers:[{answer:" 5.",id:0},{answer:" 4.",id:1},{answer:" 3.",id:2},{answer:" 2.\u003Cbr>",id:3}],id:36,right:1},{question:" Hòa tan hết 34,4g một hỗn hợp các oxit của sắt trong dung dịch H\u003Csub>2\u003C/sub>SO\u003Csub>4\u003C/sub> dư đặc nóng thì thoát ra V lít khí SO\u003Csub>2\u003C/sub> ở đktc đồng thời thu 90g muối khan. Tìm V?\u003Cbr>",answers:[{answer:" 10,08 lít",id:0},{answer:" 1,12 lít",id:1},{answer:" 2,24 lít",id:2},{answer:" 3,36 lít\u003Cbr>",id:3}],id:37,right:2},{question:" Cho m (g) Al phản ứng hoàn toàn với 23,2 g sắt từ oxit thu được hỗn hợp X. Cho X tác dụng với dd HCl dư thu 13,44 lít H\u003Csub>2\u003C/sub> (đktc). Các phản ứng xảy ra hoàn toàn. Tìm m?\u003Cbr>",answers:[{answer:" 12.6g",id:0},{answer:" 6.3g",id:1},{answer:" 25.2g",id:2},{answer:" 18.9g\u003Cbr>",id:3}],id:38,right:0},{question:" Đun nóng m gam hỗn hợp Cu và Fe có tỉ lệ khối lượng tương ứng 7: 3 với một lượng dung dịch HNO\u003Csub>3\u003C/sub>. Khi các phản ứng kết thúc, thu được 0,75m gam chất rắn, dung dịch X và 5,6 lít hỗn hợp khí (đktc) gồm NO và\u003Cbr> NO\u003Csub>2\u003C/sub> (không có sản phẩm khử khác của N+5). Biết lượng HNO\u003Csub>3\u003C/sub> đã phản ứng là 44,1 g. Giá trị của m là\u003Cbr>",answers:[{answer:" 44,8.",id:0},{answer:" 40,5.",id:1},{answer:" 33,6.",id:2},{answer:" 50,4.\u003Cbr>",id:3}],id:39,right:3}],id:0}],azota:"https://azota.vn/de-thi/u61kiz",id:"4",word:""},"uses":{"params":["subject","id"]}}];
