stion:" Tia Rơn-ghen (tia X) có tần số:\r\u003Cbr>",answers:[{answer:" lớn hơn tần số tia gamma.\tB. nhỏ hơn tần số tia hồng ngoại.\r\u003Cbr>",id:0},,{answer:" nhỏ hơn tần số tia màu đỏ.\t*D. lớn hơn tần số tia màu tím.\r\u003Cbr>",id:2}],id:13,right:-1},{question:" Một vật có khối lượng nghỉ 50 kg chuyển động với tốc độ 0,6c (c là tốc độ ánh sáng trong chân không) thì khối lượng tương đối tính của nó là:\r\u003Cbr>",answers:[{answer:" 50 kg.\tB. 40 kg.\tC. 83,3 kg.\t*D. 62,5 kg.\r\u003Cbr>",id:0}],id:14,right:-1},{question:" Khi có ánh sáng kích thích, chọn phát biểu không đúng khi nói về sự phát quang:\r\u003Cbr>",answers:[{answer:" Chất huỳnh quang thường xảy ra đối với các chất lỏng và khí.\r\u003Cbr>",id:0},{answer:" Chất lân quang thường xảy ra với chất rắn.\r\u003Cbr>",id:1},{answer:" Chất lân quang thường xảy ra đối với các chất rắn, lỏng, khí.\r\u003Cbr>",id:2},{answer:" Ánh sáng lân quang tồn tại trong thời gian dài hơn 10$^{-8}$ s sau khi tắt ánh sáng kích thích.\r\u003Cbr>",id:3}],id:15,right:2},{question:" Khi nói về ánh sáng đơn sắc, chọn phát biểu không đúng:\r\u003Cbr>",answers:[{answer:" Tần số của ánh sáng đỏ nhỏ hơn tần số ánh sáng lục.\r\u003Cbr>",id:0},{answer:" Chiết suất của một môi trường trong suốt đối với các ánh sáng đơn sắc khác nhau là khác nhau.\r\u003Cbr>",id:1},{answer:" Ánh sáng đơn sắc không bị tán sắc khi truyền qua lăng kính.\r\u003Cbr>",id:2},{answer:" Chiết suất của thủy tinh đối với ánh sáng đỏ lớn hơn chiết suất của nó đối với ánh sáng lục.\r\u003Cbr>",id:3}],id:16,right:3},{question:" Hạt nhân $_{94}^{239}$Pu có số notron nhiều hơn số proton bao nhiêu hạt ?\r\u003Cbr>",answers:[{answer:" 51 hạt.\tB. 145 hạt.\tC. 43 hạt.\tD. 94 hạt.\r\u003Cbr>",id:0}],id:17,right:0},{question:" Tính chất chung của tia hồng ngoại, ánh sáng nhìn thấy, tia tử ngoại, tia X là:\r\u003Cbr>",answers:[{answer:" có tác dụng nhiệt mạnh.\tB. có khả năng đâm xuyên mạnh.\r\u003Cbr>",id:0},,{answer:" làm phát quang nhiều chất.\t*D. truyền được trong chân không.\r\u003Cbr>",id:2}],id:18,right:-1},{question:" Đại lượng đặc trưng cho mức độ bền vững của hạt nhân là:\r\u003Cbr>",answers:[{answer:" năng lượng liên kết.\t\tB. độ hụt khối. \r\u003Cbr>",id:0},,{answer:" khối lượng hạt nhân.\t\t*D. năng lượng liên kết riêng.\r\u003Cbr>",id:2}],id:19,right:-1},{question:" Trong thí nghiệm Young về giao thoa ánh sáng đơn sắc, khi dùng ánh sáng có bước sóng 540 nm thì ta đo được khoảng vân i$_1$ = 0,2 mm. Để có khoảng vân i$_2$ = 0,24 mm, nếu không thay đổi các yếu tố khác, thì phải dùng ánh sáng đơn sắc có bước sóng là:\r\u003Cbr>",answers:[{answer:" 648 nm.\tB. 750 nm.\tC. 480 nm.\tD. 450 nm.\r\u003Cbr>",id:0}],id:20,right:0},{question:" Trong không khí, tia phóng xạ nào sau đây có khả năng ion hóa mạnh nhất:\r\u003Cbr>",answers:[{answer:" tia α\tB. tia β$^-$\tC. tia β$^+$\tD. tia γ\r\u003Cbr>",id:0}],id:21,right:0},{question:" Đồng vị phóng xạ $_{15}^{32}$P phóng xạ β$^-$ với chu kỳ bán rã T = 14,2 ngày. Sau 42,6 ngày kể từ thời điểm ban đầu, khối lượng của chất phóng xạ $_{15}^{32}$P còn lại là 2,5g. Tính khối lượng ban đầu của nó.\r\u003Cbr>",answers:[{answer:" 20g.\tB. 30g.\tC. 22,5g.\tD. 25g\r\u003Cbr>",id:0}],id:22,right:0},{question:" Năng lượng của photon ứng với bức xạ có bước sóng 662,5 nm trong chân không là:\r\u003Cbr>",answers:[{answer:" 3.10$^{-13}$ J.\t*B. 3.10$^{-19}$ J.\tC. 3.10$^{-18}$ J.\tD. 3.10$^{-20}$ J.\r\u003Cbr>",id:0}],id:23,right:-1},{question:" Khi nguyên tử hidro chuyển từ trạng thái dừng có năng lượng E$_m$ = –3,407 eV sang trạng thái dừng có năng lượng E$_n$ = –1,514 eV, thì nguyên tử sẽ phát xạ hay hấp thụ photon có tần số:\r\u003Cbr>",answers:[{answer:" phát xạ, f = 4,572.10$^{14}$ Hz.\tB. phát xạ, f = 1,188.10$^{15}$ Hz.\r\u003Cbr>",id:0},,{answer:" hấp thụ, f = 1,188.10$^{15}$ Hz.\t*D. hấp thụ, f = 4,572.10$^{14}$ Hz.\r\u003Cbr>",id:2}],id:24,right:-1},{question:" Trong khoảng thời gian 4h có 75% số hạt nhân ban đầu của một đồng vị phóng xạ bị phân rã. Chu kì bán rã của đồng vị đó là:\r\u003Cbr>",answers:[{answer:" 3h.\tB. 1h.\t*C. 2h.\tD. 4h.\r\u003Cbr>",id:0}],id:25,right:-1},{question:" Chọn phát biểu đúng khi nói về photon:\r\u003Cbr>",answers:[{answer:" Photon có thể tồn tại trong trạng thái đứng yên.\r\u003Cbr>",id:0},{answer:" Các photon trong cùng một chùm sáng đơn sắc đều mang năng lượng như nhau.\r\u003Cbr>",id:1},{answer:" Năng lượng photon càng lớn khi bước sóng ánh sáng ứng với photon đó càng lớn.\r\u003Cbr>",id:2},{answer:" Năng lượng của photon ánh sáng tím nhỏ hơn năng lượng photon ánh sáng đỏ.\r\u003Cbr>",id:3}],id:26,right:1},{question:" Năng lượng liên kết riêng là:\r\u003Cbr>",answers:[{answer:" năng lượng cần để giải phóng một electron ra khỏi nguyên tử.\r\u003Cbr>",id:0},{answer:" năng lượng liên kết tính trung bình cho một nuclon trong hạt nhân.\r\u003Cbr>",id:1},{answer:" năng lượng cần để phá vỡ hạt nhân ra thành từng nuclon.\r\u003Cbr>",id:2},{answer:" là tỉ số giữa năng lượng liên kết và số hạt có trong nguyên tử.\r\u003Cbr>",id:3}],id:27,right:1},{question:" Hạt nhân $_{18}^{40}$Ar có độ hụt khối là 0,3703u. Cho khối lượng của protôn và nơtrôn lần lượt là 1,0073u và 1,0087u. Khối lượng hạt nhân $_{18}^{40}$Ar là:\r\u003Cbr>",answers:[{answer:" 39,9525 u.\tB. 39,9745u.\tC. 40,6931u.\tD. 40,0143u.\r\u003Cbr>",id:0}],id:28,right:0},{question:" Trong thí nghiệm Young về giao thoa ánh sáng đơn sắc, khoảng vân đo được trên màn sẽ giảm khi ta:\r\u003Cbr>",answers:[{answer:" giảm bước sóng ánh sáng.\tB. giảm khoảng cách 2 khe hẹp.\r\u003Cbr>",id:0},,{answer:" tăng bước sóng ánh sáng.\tD. tịnh tiến màn ra xa 2 khe.\r\u003Cbr>",id:2}],id:29,right:0},{question:" Chọn câu không đúng. Sóng ánh sáng \r\u003Cbr>",answers:[{answer:" là sóng ngang.\t\tB. truyền được trong chân không.\r\u003Cbr>",id:0},,{answer:" là sóng dọc.\t\tD. có bản chất sóng điện từ.\r\u003Cbr>",id:2}],id:30,right:2},{question:" Xét nguyên tử Hidro theo mẫu nguyên tử Bohr, gọi r$_0$ là bán kính Bohr thì bán kính nào sau đây có thể là bán kính các quỹ đạo dừng\r\u003Cbr>",answers:[{answer:" 20r$_0$.\tB. 10r$_0$\t*C. 25r$_0$.\tD. 12r$_0$.\r\u003Cbr>",id:0}],id:31,right:-1},{question:" Trong một phản ứng hạt nhân, nếu tổng khối lượng của các hạt trước phản ứng nhỏ hơn tổng khối lượng các hạt sau phản ứng là 0,012 u. Phản ứng hạt nhân này:\r\u003Cbr>",answers:[{answer:" tỏa năng lượng 11,178 MeV.\t*B. thu năng lượng 11,178 MeV.\r\u003Cbr>",id:0},,{answer:" thu năng lượng 18,63 MeV.\tD. tỏa năng lượng 18,63 MeV.\r\u003Cbr>",id:2}],id:32,right:-1},{question:" Sự phân hạch là sự vỡ một hạt nhân nặng:\r\u003Cbr>",answers:[{answer:" thành hai hạt nhân nhẹ hơn, khi hấp thụ một protron.\r\u003Cbr>",id:0},{answer:" thường xảy ra một cách tự phát, thành nhiều hạt nhân nặng hơn.\r\u003Cbr>",id:1},{answer:" thành hai hạt nhân nhẹ hơn và vài notron, sau khi hấp thụ một notron chậm.\r\u003Cbr>",id:2},{answer:" thành hai hạt nhân nhẹ hơn, thường xảy ra một cách tự phát.\r\u003Cbr>",id:3}],id:33,right:2},{question:" Tìm độ hụt khối của hạt nhân $_{47}^{107}$Ag? biết khối lượng hạt nhân Ag là 106,8783u, khối lượng notron m$_n$ = 1,0087u, khối lượng proton m$_p$ = 1,0073u.\r\u003Cbr>",answers:[{answer:" 0,6986u.\tB. 0,6868u.\tC. 0,9686u.\t*D. 0,9868u.\r\u003Cbr>",id:0}],id:34,right:-1},{question:" Hạt nhân nguyên tử được cấu tạo từ:\r\u003Cbr>",answers:[{answer:" các notron và electron.\t\tB. các proton, notron, electron.\r\u003Cbr>",id:0},,{answer:" các proton và electron.\t\t*D. các nuclon.\r\u003Cbr>",id:2}],id:35,right:-1},{question:" Trong thuyết lượng tử, hạt mang năng lượng được gọi là hạt:\r\u003Cbr>",answers:[{answer:" notron.\tB. proton.\tC. nuclon.\t*D. photon.\r\u003Cbr>",id:0}],id:36,right:-1},{question:" Kim loại có công thoát là A = 3,55 eV. Người ta lần lượt chiếu vào kim loại các bức xạ có bước sóng λ$_1$= 0,42 μm, λ$_2$= 0,3μm. Bức xạ nào gây ra được hiện tượng quang điện là:\r\u003Cbr>",answers:[{answer:" cả hai bức xạ λ$_1$và λ$_2$.\t*B. bức xạ λ$_2$.\tC. không có bức xạ nào.\tD. bức xạ λ$_1$.\r\u003Cbr>",id:0}],id:37,right:-1},{qu
