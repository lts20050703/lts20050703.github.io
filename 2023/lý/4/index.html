					const element = document.currentScript.parentElement;

					const data = [null,{"type":"data","data":{subject:"lý",title:"ĐỀ SỐ 4",sections:[{title:"",shuffle:true,questions:[{question:" Trong khoảng thời gian 4 giờ có 75% số hạt nhân ban đầu của một đồng vị phóng xạ bị phân rã. Chu kỳ bán rã của đồng vị đó là\u003Cbr>",answers:[{answer:" 2 giờ.",id:0},{answer:" 1 giờ.",id:1},{answer:" 3 giờ.",id:2},{answer:" 4 giờ.\u003Cbr>",id:3}],id:0,right:0},{question:" Đại lượng nào sau đây đặc trưng cho mức độ bền vững của hạt nhân?\u003Cbr>",answers:[{answer:" Độ hụt khối.",id:0},{answer:" Năng lượng liên kết riêng.\u003Cbr>",id:1},{answer:" Năng lượng liên kết.",id:2},{answer:" Năng lượng nghỉ.\u003Cbr>",id:3}],id:1,right:1},{question:" Chất phóng xạ Pôlôni $_{84}^{210}$Po phát ra tia α và biến đổi thành chì $_{82}^{206}$Pb. Biết chu kỳ bán rã của Pôlôni là 138 ngày. Ban đầu có một mẫu Pôlôni nguyên chất với N$_0$ hạt nhân $_{84}^{210}$Po. Sau bao lâu thì có 0,75N$_0$ hạt nhân chì được tạo thành?\u003Cbr>",answers:[{answer:" 276 ngày.",id:0},{answer:" 414 ngày.",id:1},{answer:" 552 ngày.",id:2},{answer:" 138 ngày.\u003Cbr>",id:3}],id:2,right:0},{question:" Trong thí nghiệm Y-âng về giao thoa với ánh sáng, hai khe được chiếu sáng đồng thời hai bức xạ có bước sóng lần lượt là λ$_1$ và λ$_2$ (λ$_2$>λ$_1$), khoảng cách giữa hai khe là 0,5 mm, khoảng cách từ hai khe đến màn quan sát là 2 m. Trên màn quan sát, tại vị trí cách vân sáng trung tâm 6 mm có sự trùng nhau của vân sáng bậc 3 của bức xạ λ$_1$ với vân sáng bậc k của bức xạ λ$_2$. Giá trị của k và λ$_2$ lần lượt là\u003Cbr>",answers:[{answer:" k = 2 và λ$_2$=0,40 μm",id:0},{answer:" k = 1 và λ$_2$=0,60 μm\u003Cbr>",id:1},{answer:" k = 2 và λ$_2$=0,75 μm",id:2},{answer:" k = 3 và λ$_2$=0,50 μm\u003Cbr>",id:3}],id:3,right:2},{question:" Theo mẫu nguyên tử Bo, trong nguyên tử hiđrô, bán kính quỹ đạo K của electron trong nguyên tử hiđrô là r$_0$. Khi chuyển lên trạng thái kích thích thứ hai, bán kính quỹ đạo của electron tăng thêm\u003Cbr>",answers:[{answer:" 8r$_0$.",id:0},{answer:" 15r$_0$.",id:1},{answer:" 3r$_0$.",id:2},{answer:" 4r$_0$.\u003Cbr>",id:3}],id:4,right:0},{question:" Giới hạn quang điện của Canxi là 450 nm. Công thoát electron khỏi đồng lớn hơn công thoát electron khỏi Canxi 1,38 eV. Giới hạn quang điện của đồng là\u003Cbr>",answers:[{answer:" 902 nm.",id:0},{answer:" 902 nm.",id:1},{answer:" 300 nm.",id:2},{answer:" 902 nm.\u003Cbr>",id:3}],id:5,right:2},{question:" Công thức tính độ hụt khối của hạt nhân $_Z^A$X là\u003Cbr>",answers:[{answer:" 𝚫m = [Zm$_p$ + (A-Z)m$_n$] + m$_X$",id:0},{answer:" 𝚫m = [Zm$_p$ + (A-Z)m$_n$] - m$_X$\u003Cbr>",id:1},{answer:" 𝚫m = [Zm$_p$ - (A-Z)m$_n$] - m$_X$",id:2},{answer:" 𝚫m = [Zm$_p$ + (A+Z)m$_n$] - m$_X$\u003Cbr>",id:3}],id:6,right:1},{question:" Trong thí nghiệm Y-âng về giao thoa ánh sáng, bước sóng ánh sáng đơn sắc là 600 nm, khoảng cách giữa hai khe hẹp là 1 mm, khoảng cách từ mặt phẳng chứa hai khe đến màn là 2 m. Khoảng vân quan sát được trên màn có giá trị bằng\u003Cbr>",answers:[{answer:" 0,9 mm.",id:0},{answer:" 0,3 mm.",id:1},{answer:" 1,5 mm.",id:2},{answer:" 1,2 mm.\u003Cbr>",id:3}],id:7,right:3},{question:" Trong thí nghiệm Y-âng về giao thoa với ánh sáng đơn sắc có bước sóng 0.5μm, khoảng cách từ mặt phẳng chứa hai khe đến màn quan sát là 2 m. Ở cùng một phía so với vân sáng trung tâm, vân tối thứ 2 và vân sáng bậc 3 cách nhau 2,5 mm. Khoảng cách giữa hai khe là\u003Cbr>",answers:[{answer:" 2 mm.",id:0},{answer:" 0,6 mm.",id:1},{answer:" 1,5 mm.",id:2},{answer:" 1 mm.\u003Cbr>",id:3}],id:8,right:1},{question:" Biết N$_A$= 6,02.10$^{23}$ hạt/mol. Trong 119 gam $_{92}^{238}$U có số prôtôn gần bằng\u003Cbr>",answers:[{answer:" 2,77.10$^{25}$.",id:0},{answer:" 4,4.10$^{25}$.",id:1},{answer:" 7,2.10$^{25}$.",id:2},{answer:" 3,01.10$^{23}$.\u003Cbr>",id:3}],id:9,right:0},{question:" Trong nguyên tử hiđrô, bán kính Bo là r$_0$ = 5,3.10$^{-11}$ m. Ở một trạng thái kích thích của nguyên tử hiđrô, electron chuyển động trên quỹ đạo dừng có bán kính r = 8,48.10$^{-10}$ m. Quỹ đạo đó có tên gọi là quỹ đạo dừng\u003Cbr>",answers:[{answer:" M.",id:0},{answer:" N.",id:1},{answer:" O.",id:2},{answer:" P.\u003Cbr>",id:3}],id:10,right:1},{question:" Theo mẫu nguyên tử Bo, trong nguyên tử hiđrô, khi electron chuyển từ quỹ đạo P về quỹ đạo K thì nguyên tử phát ra phôtôn ứng với bức xạ có tần số f$_1$. Khi electron chuyển từ quỹ đạo P về quỹ đạo L thì nguyên tử phát ra phôtôn ứng với bức xạ có tần số f$_2$. Nếu electron chuyển từ quỹ đạo L về quỹ đạo K thì nguyên tử phát ra phôtôn ứng với bức xạ có tần số\u003Cbr>",answers:[{answer:" f$_3$=$\\sqrt{f_1^2+f_2^2}$",id:0},{answer:" f$_3$=f$_1$+f$_2$",id:1},{answer:" $\\frac{1}{f_3}$ = $\\frac{1}{f_1}$ + $\\frac{1}{f_2}$",id:2},{answer:" f$_3$=f$_1$-f$_2$\u003Cbr>",id:3}],id:11,right:3},{question:" Tia hồng ngoại là những bức xạ có\u003Cbr>",answers:[{answer:" bước sóng nhỏ hơn bước sóng ánh sáng đỏ.\u003Cbr>",id:0},{answer:" khả năng đâm xuyên mạnh, có thể xuyên qua lớp chì dày cỡ cm.\u003Cbr>",id:1},{answer:" bản chất là sóng điện từ.\u003Cbr>",id:2},{answer:" khả năng ion hóa mạnh không khí.\u003Cbr>",id:3}],id:12,right:2},{question:" Xét nguyên tử hiđrô theo mẫu nguyên tử Bo. Gọi r$_0$ là bán kính Bo. Bán kính quỹ đạo dừng L có giá trị là\u003Cbr>",answers:[{answer:" 9r$_0$.",id:0},{answer:" 3r$_0$.",id:1},{answer:" 2r$_0$.",id:2},{answer:" 4r$_0$.\u003Cbr>",id:3}],id:13,right:3},{question:" Hạt nhân nguyên tử được cấu tạo bởi\u003Cbr>",answers:[{answer:" nơtron và electron.",id:0},{answer:" prôtôn và nơtron.\u003Cbr>",id:1},{answer:" prôtôn và electron.",id:2},{answer:" prôtôn, nơtron và electron.\u003Cbr>",id:3}],id:14,right:1},{question:" Hạt nhân $_{Z_1}^{A_1}$X và $_{Z_2}^{A_2}$Y có độ hụt khối lần lượt là 𝚫m$_1$ và 𝚫m$_2$. Biết hạt nhân $_{Z_1}^{A_1}$X bền vững hơn hạt nhân $_{Z_2}^{A_2}$Y. Hệ thức nào sau đây là đúng?\u003Cbr>",answers:[{answer:" $\\frac{𝚫m_1}{A_1}$ > $\\frac{𝚫m_2}{A_2}$",id:0},{answer:" 𝚫m$_1$ > 𝚫m$_2$",id:1},{answer:" A$_1$ > A$_2$",id:2},{answer:" $\\frac{𝚫m_1}{A_1}$ \u003C $\\frac{𝚫m_2}{A_2}$\u003Cbr>",id:3}],id:15,right:0},{question:" Trong thí nghiệm Y-âng về giao thoa với ánh sáng đơn sắc, khoảng cách giữa hai khe là 1 mm, khoảng cách từ mặt phẳng chứa hai khe đến màn quan sát là 2 m. Trong hệ vân trên màn, vân sáng bậc 3 cách vân trung tâm 2,4 mm. Bước sóng của ánh sáng dùng trong thí nghiệm\u003Cbr>",answers:[{answer:" 0.5μm",id:0},{answer:" 0.6μm",id:1},{answer:" 0.4μm",id:2},{answer:" 0.7μm\u003Cbr>",id:3}],id:16,right:2},{question:" Tia laze có đặc điểm nào sau đây?\u003Cbr>",answers:[{answer:" Luôn có cường độ nhỏ.",id:0},{answer:" Không bị khúc xạ khi đi qua lăng kính.\u003Cbr>",id:1},{answer:" Luôn là ánh sáng trắng.",id:2},{answer:" Có tính đơn sắc cao.\u003Cbr>",id:3}],id:17,right:3},{question:" Kí hiệu của hạt nhân nguyên tử X có 3 prôtôn và 4 nơtron là\u003Cbr>",answers:[{answer:" $_3^7$X",id:0},{answer:" $_7^3$X",id:1},{answer:" $_4^7$X",id:2},{answer:" $_3^4$X\u003Cbr>",id:3}],id:18,right:0},{question:" Chiếu một chùm sáng đơn sắc hẹp tới mặt bên của một lăng kính thủy tinh đặt trong không khí. Khi đi qua lăng kính, chùm sáng này\u003Cbr>",answers:[{answer:" bị đổi màu.",id:0},{answer:" bị thay đổi tần số.\u003Cbr>",id:1},{answer:" không bị lệch khỏi phương truyền ban đầu.",id:2},{answer:" không bị tán sắc.\u003Cbr>",id:3}],id:19,right:3},{question:" Hiện tượng giao thoa sóng ánh sáng chỉ quan sát được khi hai nguồn ánh sáng là hai nguồn\u003Cbr>",answers:[{answer:" kết hợp.",id:0},{answer:" cùng cường độ sáng.",id:1},{answer:" cùng màu sắc.",id:2},{answer:" đơn sắc.\u003Cbr>",id:3}],id:20,right:0},{question:" Các phản ứng hạt nhân không tuân theo định luật bảo toàn\u003Cbr>",answers:[{answer:" số khối.",id:0},{answer:" khối lượng.",id:1},{answer:" điện tích.",id:2},{answer:" động lượng.\u003Cbr>",id:3}],id:21,right:1},{question:" Ban đầu một mẫu chất phóng xạ nguyên chất có khối lượng m$_0$, chu kỳ bán rã của chất này là 3,8 ngày. Sau 15,2 ngày khối lượng của chất phóng xạ đó còn lại là 2,24 g. Khối lượng m$_0$ là\u003Cbr>",answers:[{answer:" 5,60 g.",id:0},{answer:" 8,96 g.",id:1},{answer:" 35,84 g.",id:2},{answer:" 17,92 g.\u003Cbr>",id:3}],id:22,right:2},{question:" Hạt nhân $_4^{10}$Be có khối lượng 10,0135 u. Khối lượng của nơtron m$_n$ = 1,0087 u, khối lượng prôtôn m$_p$ = 1,0073 u. 1u = 931,5 Mev/c$^2$. Năng lượng liên kết của hạt nhân $_4^{10}$Be là\u003Cbr>",answers:[{answer:" 6,3249 eV.",id:0},{answer:" 63,2489 MeV.",id:1},{answer:" 6,3249 MeV.",id:2},{answer:" 63,2489 eV.\u003Cbr>",id:3}],id:23,right:1},{question:" Hiện tượng quang điện ngoài là hiện tượng electron bị bứt ra khỏi tấm kim loại khi\u003Cbr>",answers:[{answer:" chiếu vào tấm kim loại này một chùm hạt nhân Heli.\u003Cbr>",id:0},{answer:" cho dòng điện chạy qua tấm kim loại này.\u003Cbr>",id:1},{answer:" chiếu vào tấm kim loại này một bức xạ điện từ có bước sóng thích hợp.\u003Cbr>",id:2},{answer:" tấm kim loại này bị nung nóng bởi một nguồn nhiệt.\u003Cbr>",id:3}],id:24,right:2},{question:" Ban đầu có một mẫu phóng xạ nguyên chất, sau thời gian τ số hạt nhân chất phóng xạ giảm đi e lần (e là cơ số của loga tự nhiên với lne = 1). Sau thời gian t=3$^τ$ thì khối lượng chất phóng xạ trong mẫu còn lại bao nhiêu phần trăm so với ban đầu?\u003Cbr>",answers:[{answer:" 15%.",id:0},{answer:" 12,5%.",id:1},{answer:" 25%.",id:2},{answer:" 5%.\u003Cbr>",id:3}],id:25,right:3},{question:" Giới hạn quang điện của một kim loại là 0,50 µm. Công thoát êlectron của kim loại này bằng bao nhiêu? (Cho hằng số Plăng h = 6,625.10$^{-34}$ J.s; tốc độ ánh sáng trong chân không c = 3.10$^8$ m/s; 1eV = 1,6.10$^{-19}$J)\u003Cbr>",answers:[{answer:" 3,975 eV.",id:0},{answer:" 2,48 eV.",id:1},{answer:" 3,65 eV.",id:2},{answer:" 1,24 eV.\u003Cbr>",id:3}],id:26,right:1},{question:" Giới hạn quang điện của mỗi kim loại là\u003Cbr>",answers:[{answer:" công nhỏ nhất dùng để bức electron ra khỏi kim loại đó.\u003Cbr>",id:0},{answer:" công lớn nhất dùng để bức electron ra khỏi kim loại đó.\u003Cbr>",id:1},{answer:" bước sóng dài nhất của bức xạ chiếu vào kim loại đó để gây ra được hiện tượng quang điện.\u003Cbr>",id:2},{answer:" bước sóng ngắn nhất của bức xạ chiếu vào kim loại đó để gây ra được hiện tượng quang điện.\u003Cbr>",id:3}],id:27,right:2},{question:" Khi nói về tia tử ngoại, phát biểu nào sau đây sai?\u003Cbr>",answers:[{answer:" bước sóng lớn hơn bước sóng ánh sáng tím.",id:0},{answer:" kích thích sự phát quang của nhiều chất.\u003Cbr>",id:1},{answer:" tác dụng lên phim ảnh.",id:2},{answer:" có bản chất là sóng điện từ.\u003Cbr>",id:3}],id:28,right:0},{question:" Cho 4 tia phóng xạ: tia α, tia β$^+$, tia β$^-$, tia γ đi vào một miền có điện trường đều theo phương vuông góc với đường sức điện. Tia phóng xạ không bị lệch khỏi phương truyền ban đầu là\u003Cbr>",answers:[{answer:" Tia α.",id:0},{answer:" Tia β$^+$.",id:1},{answer:" Tia β$^-$.",id:2},{answer:" Tia γ.\u003Cbr>",id:3}],id:29,right:2},{question:" Khi electron ở quỹ đạo dừng thứ n thì năng lượng của nguyên tử hiđrô được tính theo công thức E$_n$ = -$\\frac{13,6}{n^2}$ (eV) (n = 1, 2, 3, ...). Khi electron trong nguyên tử hiđrô chuyển từ quỹ đạo dừng n = 3 sang quỹ đạo dừng n = 2 thì nguyên tử hiđrô phát ra phôtôn ứng với bức xạ có bước sóng bằng\u003Cbr>",answers:[{answer:" 0.6576μm",id:0},{answer:" 0.4861μm",id:1},{answer:" 0.4350μm",id:2},{answer:" 0.4102μm\u003Cbr>",id:3}],id:30,right:0},{question:" Khi nói về thuyết lượng tử ánh sáng, phát biểu nào sau đây là đúng?\u003Cbr>",answers:[{answer:" Năng lượng của phôtôn càng lớn khi tần số của ánh sáng ứng với phôtôn đó càng nhỏ.\u003Cbr>",id:0},{answer:" Ánh sáng được tạo bởi các hạt gọi là phôtôn.\u003Cbr>",id:1},{answer:" Năng lượng phôtôn càng nhỏ khi cường độ chùm sáng càng nhỏ.\u003Cbr>",id:2},{answer:" Phôtôn có thể chuyển động hay đứng yên tùy thuộc vào nguồn sáng chuyển động hay đứng yên.\u003Cbr>",id:3}],id:31,right:1},{question:" Bước sóng dài nhất để bứt được electron ra khỏi hai kim loại X và Y lần lượt là 3 nm và 4,5 nm, công thoát tương ứng là A1 và A2. Chọn câu đúng.\u003Cbr>",answers:[{answer:" A$_2$ = 2A$_1$",id:0},{answer:" A$_1$ = 2A$_2$",id:1},{answer:" A$_2$ = 1.5A$_1$",id:2},{answer:" A$_1$ = 1.5A$_1$\u003Cbr>",id:3}],id:32,right:3},{question:" Giới hạn quang điện của các kim loại bạc, đồng, kẽm và nhôm lần lượt là 0.26μm; 0.3μm; 0.35μm; 0.36μm. Nếu chiếu bức xạ có bước sóng λ$_1$ vào các kim loại trên thì hiện tượng quang điện chỉ xảy ra với kim loại nhôm. Nếu chiếu bức xạ có bước sóng λ$_2$ vào các kim loại trên thì hiện tượng quang điện chỉ không xảy ra với kim loại bạc. Hiệu λ$_1$ - λ$_2$ không thể nhận giá trị nào sau đây?\u003Cbr>",answers:[{answer:" 0.04μm",id:0},{answer:" 0.08μm",id:1},{answer:" 0.09μm",id:2},{answer:" 0.06μm\u003Cbr>",id:3}],id:33,right:0},{question:" Hạt nhân Urani $_{92}^{238}$U sau một chuỗi phân rã, biến đổi thành hạt nhân chì $_{82}^{206}$Pb. Trong quá trình đó, chu kỳ bán rã của $_{92}^{238}$U biến đổi thành hạt nhân chì là 4,47.109 năm. Giả sử khối đá lúc mới hình thành không chứa chì và tất cả lượng chì có mặt trong đó đều là sản phẩm phân rã của $_{92}^{238}$U. Nếu hiện nay tỉ lệ khối lượng của $_{92}^{238}$U và $_{82}^{206}$Pb là 50 thì tuổi của đá ấy là bao nhiêu?\u003Cbr>",answers:[{answer:" 1,2.10$^8$ năm.",id:0},{answer:" 1,5.10$^8$ năm.",id:1},{answer:" 0,5.10$^8$ năm.",id:2},{answer:" 2.10$^8$ năm.\u003Cbr>",id:3}],id:34,right:1},{question:" Trong y học để diệt các tế bào ung thư người ta có thể sử dụng tia nào sau đây?\u003Cbr>",answers:[{answer:" Tia gamma.",id:0},{answer:" Tia hồng ngoại.",id:1},{answer:" Tia X.",id:2},{answer:" Tia tử ngoại.\u003Cbr>",id:3}],id:35,right:2},{question:" Electron có khối lượng nghỉ m$_e$ = 9,1.10$^{-31}$ kg. Theo thuyết tương đối, khi hạt này chuyển động với tốc độ v = $\\frac{2}{3}$ c (c là tốc độ ánh sáng trong chân không) thì khối lượng tương đối tính của hạt electron này là\u003Cbr>",answers:[{answer:" 13,65.10$^{-31}$ kg.",id:0},{answer:" 6,10.10$^{-31}$ kg.",id:1},{answer:" 12,21.10$^{-31}$ kg.",id:2},{answer:" 6,83.10$^{-31}$ kg.\u003Cbr>",id:3}],id:36,right:2},{question:" Phát biểu nào sau đây là sai khi nói về ánh sáng đơn sắc?\u003Cbr>",answers:[{answer:" Trong cùng một môi trường truyền, tốc độ ánh sáng tím nhỏ hơn tốc độ ánh sáng đỏ.\u003Cbr>",id:0},{answer:" Ánh sáng đơn sắc là ánh sáng không bị thay đổi màu sắc khi đi qua lăng kính.\u003Cbr>",id:1},{answer:" Chiết suất của một môi trường trong suốt đối với ánh sáng đỏ lớn hơn chiết suất của môi trường đó đối với ánh sáng tím.\u003Cbr>",id:2},{answer:" Trong chân không, các ánh sáng đơn sắc khác nhau truyền đi với cùng tốc độ.\u003Cbr>",id:3}],id:37,right:2},{question:" Trong thí nghiệm Y-âng về giao thoa với ánh sáng đơn sắc, tại điểm M trên màn có vân sáng bậc 5. Dịch chuyển màn quan sát ra xa thêm 20 cm thì tại M là vân tối thứ 5 tính từ vân sáng trung tâm. Trước lúc dịch chuyển, khoảng cách từ mặt phẳng chứa hai khe đến màn quan sát bằng\u003Cbr>",answers:[{answer:" 2,2 m.\u003Cbr>",id:0},{answer:" 1,6 m.\u003Cbr>",id:1},{answer:" 2 m.\u003Cbr>",id:2},{answer:" 1,8 m.\u003Cbr>",id:3}],id:38,right:3},{question:" Trong chân không, bức xạ có bước sóng nào say đây là bức xạ hồng ngoại?\u003Cbr>",answers:[{answer:" 250 nm.",id:0},{answer:" 450 nm.",id:1},{answer:" 600 nm.",id:2},{answer:" 900 nm.\u003Cbr>",id:3}],id:39,right:2}],id:0}],azota:"https://azota.vn/de-thi/zuf3mb",id:"4",word:""},"uses":{"params":["subject","id"]}}];
